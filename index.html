<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Wheel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    #word-container {
      display: flex;
      gap: 0.05em;
      align-items: center;
      justify-content: center;
    }

    .letter-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #bbb;
      line-height: 1;
      transition: color 0.1s;
    }
    .btn-zone:hover { color: #000; }

    .letter-display {
      font-weight: bold;
      line-height: 1;
    }

    .cv-btn {
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      border: 1px solid #999;
      border-radius: 3px;
      cursor: pointer;
      color: #555;
      line-height: 1;
    }
    .cv-btn:hover { background: #f0f0f0; }

    #toggle-btn {
      position: fixed;
      bottom: 14px;
      left: 14px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      background: #fff;
      color: #000;
      border: 1px solid #999;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
    }
    #toggle-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>

<div id="word-container"></div>
<button id="toggle-btn">3 letters</button>

<script>
  const VOWELS     = ['A','E','I','O','U'];
  const CONSONANTS = ['B','C','D','F','G','H','J','K','L','M','N','P','Q','R','S','T','V','W','X','Y','Z'];
  const ALL        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  let numLetters = 3;
  // Each entry: { mode: 'all'|'v'|'c', idx: index within current set }
  let cols = [];

  function currentSet(mode) {
    if (mode === 'v') return VOWELS;
    if (mode === 'c') return CONSONANTS;
    return ALL;
  }

  function initCols(n) {
    cols = Array.from({length: n}, () => ({ mode: 'c', idx: 0 }));
  }

  function advance(i, dir) {
    const set = currentSet(cols[i].mode);
    cols[i].idx = (cols[i].idx + dir + set.length) % set.length;
    render();
  }

  function toggleCV(i) {
    if (cols[i].mode === 'v') {
      cols[i].mode = 'c';
      cols[i].idx = 0; // first consonant: B
    } else {
      cols[i].mode = 'v';
      cols[i].idx = 0; // first vowel: A
    }
    render();
  }

  function render() {
    const container = document.getElementById('word-container');
    container.innerHTML = '';

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const fontSize = Math.min(
      Math.floor(vw / (numLetters * 0.72)),
      Math.floor(vh * 0.55)
    );
    const cvSize   = Math.max(10, Math.floor(fontSize * 0.13));
    const arrowSize = Math.floor(fontSize * 0.38);

    cols.forEach((col, i) => {
      const set    = currentSet(col.mode);
      const letter = set[col.idx];

      const colEl = document.createElement('div');
      colEl.className = 'letter-col';

      // Up arrow
      const upZone = document.createElement('div');
      upZone.className = 'btn-zone';
      upZone.style.fontSize = arrowSize + 'px';
      upZone.style.width    = fontSize * 0.72 + 'px';
      upZone.style.height   = fontSize * 0.26 + 'px';
      upZone.textContent    = '▲';
      upZone.addEventListener('click', () => advance(i, 1));

      // Letter
      const letterDiv = document.createElement('div');
      letterDiv.className    = 'letter-display';
      letterDiv.style.fontSize = fontSize + 'px';
      letterDiv.textContent  = letter;

      // Down arrow
      const downZone = document.createElement('div');
      downZone.className = 'btn-zone';
      downZone.style.fontSize = arrowSize + 'px';
      downZone.style.width    = fontSize * 0.72 + 'px';
      downZone.style.height   = fontSize * 0.26 + 'px';
      downZone.textContent    = '▼';
      downZone.addEventListener('click', () => advance(i, -1));

      // C/V toggle button
      const cvBtn = document.createElement('button');
      cvBtn.className = 'cv-btn';
      cvBtn.style.fontSize  = cvSize + 'px';
      cvBtn.style.marginTop = Math.floor(fontSize * 0.06) + 'px';
      cvBtn.style.padding   = Math.floor(cvSize * 0.3) + 'px ' + Math.floor(cvSize * 0.55) + 'px';
      cvBtn.textContent     = col.mode === 'v' ? 'v' : 'c';
      cvBtn.addEventListener('click', () => toggleCV(i));

      colEl.appendChild(upZone);
      colEl.appendChild(letterDiv);
      colEl.appendChild(downZone);
      colEl.appendChild(cvBtn);
      container.appendChild(colEl);
    });
  }

  const toggleBtn = document.getElementById('toggle-btn');
  toggleBtn.addEventListener('click', () => {
    numLetters = (numLetters % 4) + 1;
    toggleBtn.textContent = numLetters + ' letter' + (numLetters > 1 ? 's' : '');
    initCols(numLetters);
    render();
  });

  window.addEventListener('resize', render);

  initCols(numLetters);
  render();
</script>
</body>
</html>
